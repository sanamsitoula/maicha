# ==============================================
# AI Automation Server - Docker Compose
# ==============================================

services:

  # ----- PostgreSQL: Main Relational Database -----
  # Stores structured data: users, orders, listings, analytics
  postgres:
    image: postgres:16-alpine
    container_name: ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----- Qdrant: Vector Database -----
  # Stores AI "memories" as mathematical embeddings for semantic search
  qdrant:
    image: qdrant/qdrant:latest
    container_name: ai-qdrant
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
    volumes:
      - ./qdrant/data:/qdrant/storage
    ports:
      - "127.0.0.1:6333:6333"

  # ----- Nginx: Reverse Proxy -----
  # Routes incoming web traffic to the correct service
  nginx:
    image: nginx:alpine
    container_name: ai-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/maicha.html:/etc/nginx/maicha.html:ro
    depends_on:
      - postgres
      - qdrant
  # ----- Ollama: Local AI Model Runner -----
  # Runs open-source AI models locally on your server
  ollama:
    image: ollama/ollama:latest
    container_name: ai-ollama
    restart: unless-stopped
    volumes:
      - ./ollama/data:/root/.ollama
    ports:
      - "127.0.0.1:11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0

  # ----- Open WebUI: Chat Interface -----
  # A ChatGPT-like web interface that connects to your local AI models
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: ai-open-webui
    restart: unless-stopped
    volumes:
      - ./open-webui/data:/app/backend/data
    ports:
      - "3000:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      - ollama


# ----- Adminer: Database Management UI -----
  # Visual tool to browse and query your PostgreSQL database
  adminer:
    image: adminer:latest
    container_name: ai-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres


# ----- AI Agents: Python runtime for all agents -----
  agent-runner:
    build:
      context: ./agents
      dockerfile: Dockerfile
    container_name: ai-agent-runner
    restart: "no"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - OLLAMA_BASE_URL=http://ollama:11434
      - DEFAULT_MODEL=llama3.2:3b
    depends_on:
      - postgres
      - ollama
    stdin_open: true
    tty: true

  # ----- FastAPI: REST API Backend -----
  fastapi:
    build:
      context: ./agents
      dockerfile: Dockerfile
    container_name: ai-fastapi
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - OLLAMA_BASE_URL=http://ollama:11434
      - DEFAULT_MODEL=llama3.2:3b
      - API_KEY=change-me-to-a-real-key
    volumes:
      - ./n8n/workflows:/opt/ai-server/n8n/workflows:ro
    depends_on:
      - postgres
      - ollama

  # ----- n8n: Workflow Automation Engine -----
  n8n:
    image: n8nio/n8n:latest
    container_name: ai-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://20.41.122.188:5678/
      - GENERIC_TIMEZONE=${TIMEZONE}
      - N8N_SECURE_COOKIE=false
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - ./n8n/data:/home/node/.n8n
    depends_on:
      - postgres

<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Maicha — AI Platform</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0%25' stop-color='%23F97316'/><stop offset='100%25' stop-color='%23EA580C'/></linearGradient></defs><rect width='64' height='64' rx='16' fill='url(%23g)'/><text x='32' y='46' font-size='36' text-anchor='middle' font-weight='900' fill='white' font-family='serif'>M</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
:root{--bg:#FAFAF8;--bg2:#fff;--bg3:#F5F3EF;--bg4:#EDE9E1;--bd:rgba(234,88,12,.12);--tx:#1C1412;--tx2:#6B5B50;--tx3:#9C8B80;--ac:#F97316;--ac2:#EA580C;--abg:#FFF7ED;--bl:#2563EB;--gn:#059669;--rd:#DC2626;--pu:#7C3AED;--pk:#DB2777;--am:#D97706;--tl:#0D9488}
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'Outfit',sans-serif;overflow:hidden}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px}
input:focus,select:focus,textarea:focus{outline:none}button{cursor:pointer;font-family:inherit}
@keyframes fd{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes sp{to{transform:rotate(360deg)}}@keyframes pu{0%,100%{opacity:.4}50%{opacity:1}}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.fd{animation:fd .3s ease}.gl{background:rgba(255,255,255,.75);backdrop-filter:blur(12px);border:1.5px solid var(--bd)}
body::before{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(at 10% 15%,rgba(249,115,22,.07) 0%,transparent 45%),radial-gradient(at 90% 80%,rgba(234,88,12,.05) 0%,transparent 45%)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:var(--bg2);border-radius:20px;padding:28px;max-width:480px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.15)}
</style></head><body><div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef,useCallback}=React;
const API=window.location.origin;
const AGENTS=[
{n:"restaurant",i:"\u{1F37D}\uFE0F",l:"Restaurant",d:"Orders, menu, reservations",c:"#F97316"},
{n:"real-estate",i:"\u{1F3E0}",l:"Real Estate",d:"Property listings",c:"#2563EB"},
{n:"social-media",i:"\u{1F4F1}",l:"Social Media",d:"Content & hashtags",c:"#DB2777"},
{n:"marketing",i:"\u{1F4E3}",l:"Marketing",d:"Ads, emails, campaigns",c:"#7C3AED"},
{n:"video",i:"\u{1F3AC}",l:"Video",d:"Scripts & production",c:"#059669"},
{n:"hermes",i:"\u{1F9E0}",l:"Hermes",d:"Orchestrator + Nepali",c:"#D97706"}];

async function api(p,o={}){const h={"Content-Type":"application/json",...(o.headers||{})};
const t=localStorage.getItem("mt");if(t)h.Authorization="Bearer "+t;
const r=await fetch(API+p,{...o,headers:h});if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.detail||"HTTP "+r.status)}return r.json()}

function Btn({children,onClick,color,small,disabled,full,outline}){
return <button onClick={onClick} disabled={disabled} style={{padding:small?"7px 16px":"11px 22px",borderRadius:12,
border:outline?"1.5px solid "+(color||"var(--ac)")+"40":"none",
background:outline?"transparent":disabled?"var(--bg4)":color||"var(--ac)",
color:outline?color||"var(--ac)":"#fff",fontSize:small?12:14,fontWeight:600,
width:full?"100%":"auto",opacity:disabled?.5:1,transition:"all .2s"}}>{children}</button>}

function Inp({value,onChange,placeholder,type,label}){
return <div style={{marginBottom:14}}>{label&&<div style={{fontSize:12,color:"var(--tx2)",marginBottom:5,fontWeight:600}}>{label}</div>}
<input value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} type={type||"text"}
style={{width:"100%",padding:"11px 16px",borderRadius:12,border:"1.5px solid var(--bd)",background:"var(--bg)",color:"var(--tx)",fontSize:14}}/></div>}

function Logo({s}){return <div style={{width:s||40,height:s||40,borderRadius:(s||40)*.3,
background:"linear-gradient(135deg,#F97316,#EA580C)",display:"flex",alignItems:"center",justifyContent:"center",
fontSize:(s||40)*.5,fontWeight:900,color:"#fff",fontFamily:"'Instrument Serif',serif",
boxShadow:"0 4px 20px rgba(249,115,22,.35)",flexShrink:0}}>M</div>}

function Stat({l,v,i,c}){return <div className="gl" style={{borderRadius:16,padding:"18px 20px",flex:"1 1 140px",minWidth:140}}>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
<span style={{fontSize:18}}>{i}</span>
<span style={{fontSize:10,color:c,fontFamily:"'JetBrains Mono',monospace",background:c+"12",padding:"3px 8px",borderRadius:6}}>{l}</span></div>
<div style={{fontSize:28,fontWeight:800,fontFamily:"'Instrument Serif',serif"}}>{v!=null?v:"\u2014"}</div></div>}

function Landing({onStart}){return <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",textAlign:"center",padding:24}}>
<div className="fd" style={{maxWidth:600}}>
<div style={{animation:"fl 3s ease infinite",marginBottom:24}}><Logo s={72}/></div>
<h1 style={{fontSize:42,fontWeight:800,fontFamily:"'Instrument Serif',serif",marginBottom:8}}>Maicha</h1>
<div style={{fontSize:12,color:"var(--tx3)",fontFamily:"'JetBrains Mono',monospace",letterSpacing:".15em",marginBottom:24}}>AI AUTOMATION PLATFORM</div>
<p style={{fontSize:16,color:"var(--tx2)",lineHeight:1.7,maxWidth:460,margin:"0 auto 32px"}}>Self-hosted AI agents for restaurants, real estate, social media, marketing, and video production.</p>
<div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap",marginBottom:32}}>
{AGENTS.map(a=><span key={a.n} style={{padding:"6px 14px",borderRadius:16,background:"var(--abg)",color:"var(--ac2)",fontSize:11,fontWeight:600,border:"1px solid rgba(249,115,22,.1)"}}>{a.i} {a.l}</span>)}
</div>
<div style={{display:"flex",gap:12,justifyContent:"center",flexWrap:"wrap"}}>
<Btn onClick={()=>onStart("guest")} color="linear-gradient(135deg,#F97316,#EA580C)">Try as Guest</Btn>
<Btn onClick={()=>onStart("login")} outline>Sign In</Btn>
<Btn onClick={()=>onStart("register")} outline color="var(--tx3)">Create Account</Btn>
</div></div></div>}

function Auth({mode,onAuth,onBack}){const[e,sE]=useState("");const[p,sP]=useState("");const[n,sN]=useState("");const[err,sErr]=useState("");const[ld,sLd]=useState(false);
const go=async()=>{sLd(true);sErr("");try{if(mode==="guest"){const d=await api("/auth/guest",{method:"POST"});localStorage.setItem("mt",d.token);onAuth(d.user);return}
const ep=mode==="login"?"/auth/login":"/auth/register";const bd=mode==="login"?{email:e,password:p}:{email:e,password:p,full_name:n||undefined};
const d=await api(ep,{method:"POST",body:JSON.stringify(bd)});if(d.status==="error"){sErr(d.message);sLd(false);return}
localStorage.setItem("mt",d.token);onAuth(d.user)}catch(x){sErr(x.message)}sLd(false)};
useEffect(()=>{if(mode==="guest")go()},[mode]);
if(mode==="guest")return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{width:24,height:24,border:"3px solid var(--bg4)",borderTopColor:"var(--ac)",borderRadius:"50%",animation:"sp 1s linear infinite"}}/></div>;
return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
<div className="fd gl" style={{width:400,maxWidth:"90vw",padding:36,borderRadius:24,boxShadow:"0 20px 60px rgba(249,115,22,.1)"}}>
<div style={{textAlign:"center",marginBottom:24}}><Logo s={48}/><div style={{fontSize:22,fontWeight:700,marginTop:12,fontFamily:"'Instrument Serif',serif"}}>{mode==="login"?"Welcome back":"Create account"}</div></div>
{mode==="register"&&<Inp value={n} onChange={sN} placeholder="Full name" label="Name"/>}
<Inp value={e} onChange={sE} placeholder="you@email.com" label="Email" type="email"/>
<Inp value={p} onChange={sP} placeholder="Password" label="Password" type="password"/>
{err&&<div style={{color:"var(--rd)",fontSize:13,marginBottom:12,padding:"10px 14px",background:"#DC262612",borderRadius:10}}>{err}</div>}
<Btn onClick={go} full disabled={ld} color="linear-gradient(135deg,#F97316,#EA580C)">{ld?"Loading...":mode==="login"?"Sign In":"Create Account"}</Btn>
<button onClick={onBack} style={{display:"block",margin:"16px auto 0",background:"none",border:"none",color:"var(--tx3)",fontSize:13}}>Back</button>
</div></div>}

function App({user,onLogout}){
const[tab,sTab]=useState("chat");const[ag,sAg]=useState("restaurant");const[mdl,sMdl]=useState("");const[models,sMod]=useState(null);
const[msgs,sMsgs]=useState([]);const[inp,sInp]=useState("");const[ld,sLd]=useState(false);const[sid,sSid]=useState(null);
const[stats,sSt]=useState(null);const[menu,sMenu]=useState(null);const[props,sProps]=useState(null);
const[ords,sOrds]=useState(null);const[evts,sEvts]=useState(null);const[convs,sConvs]=useState(null);const[resvs,sResvs]=useState(null);
const[settings,sSets]=useState(null);const[stab,sStab]=useState("smtp");const[sform,sSform]=useState({});const[smsg,sSmsg]=useState("");
const[etab,sEtab]=useState("menu");const[sb,sSb]=useState(window.innerWidth>768);const[ok,sOk]=useState(false);const[n8n,sN8n]=useState(null);
const[pull,sPull]=useState("");const[modal,sMod2]=useState(null);const[mform,sMform]=useState({});
const cr=useRef(null);const ir=useRef(null);const adm=user?.role==="admin";const aa=AGENTS.find(a=>a.n===ag);

const TABS=[{id:"chat",l:"Chat",i:"\u{1F4AC}"},{id:"explore",l:"Explore",i:"\u{1F50D}"},{id:"dashboard",l:"Dashboard",i:"\u{1F4CA}"},
{id:"n8n",l:"Workflows",i:"\u2699\uFE0F"},...(adm?[{id:"models",l:"Models",i:"\u{1F916}"},{id:"settings",l:"Settings",i:"\u{1F527}"}]:[])];

E(()=>{cr.current?.scrollIntoView({behavior:"smooth"})},[msgs,ld]);
E(()=>{api("/health").then(()=>sOk(true)).catch(()=>sOk(false))},[]);
E(()=>{api("/models").then(d=>{sMod(d);sMdl(d.default?.name||"qwen3:8b")}).catch(()=>{})},[]);

const QP={"restaurant":["What's on the menu?","Order a Neural Burger","Reserve table for 4"],
"real-estate":["Show properties","Properties in Kathmandu","Schedule viewing"],
"social-media":["Instagram post about food","TikTok captions","Hashtags for travel"],
"marketing":["Email subject line","Ad copy summer sale","Blog post about AI"],
"video":["30s TikTok script","YouTube intro","Create voiceover"],
"hermes":["Post about Kathmandu in Nepali","Route order to restaurant","Bilingual content"]};

const send=useCallback(async()=>{if(!inp.trim()||ld)return;const m=inp.trim();sInp("");
sMsgs(p=>[...p,{r:"user",c:m}]);sLd(true);
try{const d=await api("/chat",{method:"POST",body:JSON.stringify({message:m,agent_type:ag,model:mdl,session_id:sid||"new"})});
sSid(d.session_id);sMsgs(p=>[...p,{r:"assistant",c:d.response,el:d.elapsed_seconds,ml:d.model_used}])}
catch(e){sMsgs(p=>[...p,{r:"assistant",c:"Error: "+e.message}])}sLd(false)},[inp,ld,ag,mdl,sid]);

const clr=()=>{sMsgs([]);sSid(null)};
const dl=()=>{const t=msgs.map(m=>(m.r==="user"?"You":aa.l)+": "+m.c).join("\n\n---\n\n");
const b=new Blob([t],{type:"text/plain"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download="maicha-"+ag+".txt";a.click()};

const ldEx=useCallback(async s=>{sEtab(s);try{
if(s==="menu"&&!menu)sMenu(await api("/menu"));
if(s==="properties"&&!props)sProps(await api("/properties"));
if(s==="orders")sOrds(await api("/orders-detailed"));
if(s==="events"&&!evts)sEvts(await api("/events"));
if(s==="reservations")sResvs(await api("/reservations"));
if(s==="conversations")sConvs(await api("/conversations-detailed"));}catch(e){console.error(e)}},[menu,props,evts]);

const ldSt=useCallback(async()=>{try{sSt(await api("/stats"))}catch(e){}},[]);
const ldSe=useCallback(async()=>{try{sSets(await api("/settings"))}catch(e){}},[]);
const ldN8=useCallback(async()=>{try{sN8n(await api("/n8n/workflows"))}catch(e){}},[]);

E(()=>{if(tab==="dashboard")ldSt()},[tab]);E(()=>{if(tab==="explore")ldEx("menu")},[tab]);
E(()=>{if(tab==="settings"&&adm)ldSe()},[tab]);E(()=>{if(tab==="n8n")ldN8()},[tab]);

const svSe=async c=>{sSmsg("");try{await api("/settings/"+c,{method:"POST",body:JSON.stringify(sform)});sSmsg("Saved!");ldSe()}catch(e){sSmsg("Error: "+e.message)}};
const tsSe=async c=>{sSmsg("Testing...");try{const d=await api("/settings/"+c+"/test",{method:"POST"});sSmsg(d.status==="ok"?"Test passed!":"Failed: "+(d.message||""))}catch(e){sSmsg("Error: "+e.message)}};
const plMd=async()=>{if(!pull.trim())return;try{await api("/models/ollama/pull",{method:"POST",body:JSON.stringify({name:pull})});sPull("");sMod(await api("/models"))}catch(e){alert(e.message)}};

const addMenuItem=async()=>{try{await api("/menu/add",{method:"POST",body:JSON.stringify(mform)});sMod2(null);sMform({});sMenu(await api("/menu"))}catch(e){alert(e.message)}};
const addProperty=async()=>{try{await api("/properties/add",{method:"POST",body:JSON.stringify(mform)});sMod2(null);sMform({});sProps(await api("/properties"))}catch(e){alert(e.message)}};

return <div style={{height:"100vh",display:"flex",flexDirection:"column",position:"relative"}}>
{modal&&<div className="modal-bg" onClick={()=>sMod2(null)}><div className="modal fd" onClick={e=>e.stopPropagation()}>
{modal==="menu"&&<><div style={{fontSize:18,fontWeight:700,marginBottom:16}}>Add menu item</div>
<Inp label="Name" value={mform.name||""} onChange={v=>sMform(p=>({...p,name:v}))} placeholder="Pixel Pizza"/>
<Inp label="Description" value={mform.description||""} onChange={v=>sMform(p=>({...p,description:v}))} placeholder="Delicious pizza"/>
<Inp label="Price" value={mform.price||""} onChange={v=>sMform(p=>({...p,price:parseFloat(v)||0}))} type="number" placeholder="12.99"/>
<Inp label="Category" value={mform.category||""} onChange={v=>sMform(p=>({...p,category:v}))} placeholder="main / appetizer / dessert"/>
<Inp label="Dietary tags (comma-separated)" value={mform.tags||""} onChange={v=>sMform(p=>({...p,tags:v,dietary_tags:v.split(",").map(t=>t.trim()).filter(Boolean)}))} placeholder="vegetarian, vegan"/>
<Btn onClick={addMenuItem} full>Add item</Btn></>}
{modal==="property"&&<><div style={{fontSize:18,fontWeight:700,marginBottom:16}}>Add property</div>
<Inp label="Title" value={mform.title||""} onChange={v=>sMform(p=>({...p,title:v}))} placeholder="Cozy Apartment"/>
<Inp label="Description" value={mform.description||""} onChange={v=>sMform(p=>({...p,description:v}))}/>
<div style={{display:"flex",gap:8}}><div style={{flex:1}}><Inp label="Price" value={mform.price||""} onChange={v=>sMform(p=>({...p,price:parseFloat(v)||0}))} type="number"/></div>
<div style={{flex:1}}><Inp label="Type" value={mform.listing_type||""} onChange={v=>sMform(p=>({...p,listing_type:v}))} placeholder="rent / sale"/></div></div>
<div style={{display:"flex",gap:8}}><div style={{flex:1}}><Inp label="Bedrooms" value={mform.bedrooms||""} onChange={v=>sMform(p=>({...p,bedrooms:parseInt(v)||0}))} type="number"/></div>
<div style={{flex:1}}><Inp label="Bathrooms" value={mform.bathrooms||""} onChange={v=>sMform(p=>({...p,bathrooms:parseFloat(v)||0}))} type="number"/></div></div>
<div style={{display:"flex",gap:8}}><div style={{flex:1}}><Inp label="City" value={mform.city||""} onChange={v=>sMform(p=>({...p,city:v}))}/></div>
<div style={{flex:1}}><Inp label="State" value={mform.state||""} onChange={v=>sMform(p=>({...p,state:v}))}/></div></div>
<Btn onClick={addProperty} full>Add property</Btn></>}
</div></div>}

<header className="gl" style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 16px",borderBottom:"1.5px solid var(--bd)",flexShrink:0,gap:8,flexWrap:"wrap",zIndex:10,position:"relative"}}>
<div style={{display:"flex",alignItems:"center",gap:10}}>
<button onClick={()=>sSb(!sb)} style={{background:"none",border:"none",color:"var(--tx3)",fontSize:18,padding:4}}>\u2630</button>
<Logo s={34}/><div><div style={{fontSize:18,fontWeight:700,fontFamily:"'Instrument Serif',serif"}}>Maicha</div>
<div style={{fontSize:8,color:"var(--tx3)",fontFamily:"'JetBrains Mono',monospace",letterSpacing:".12em"}}>AI PLATFORM</div></div></div>
<div style={{display:"flex",gap:3,background:"var(--bg3)",borderRadius:12,padding:3,overflow:"auto"}}>
{TABS.map(t=><button key={t.id} onClick={()=>sTab(t.id)} style={{padding:"7px 14px",borderRadius:9,border:"none",fontSize:12,fontWeight:600,whiteSpace:"nowrap",
background:tab===t.id?"var(--bg2)":"transparent",color:tab===t.id?"var(--ac)":"var(--tx3)",boxShadow:tab===t.id?"0 1px 6px rgba(249,115,22,.1)":"none",
display:"flex",alignItems:"center",gap:4}}><span>{t.i}</span>{t.l}</button>)}</div>
<div style={{display:"flex",alignItems:"center",gap:10}}>
{models&&<select value={mdl} onChange={e=>sMdl(e.target.value)} style={{background:"var(--bg2)",border:"1.5px solid var(--bd)",borderRadius:10,padding:"7px 10px",color:"var(--tx2)",fontSize:11,fontFamily:"'JetBrains Mono',monospace",maxWidth:180}}>
{(models.ollama_installed||[]).map(m=><option key={m.name} value={m.name}>{m.name} ({m.details?.parameter_size})</option>)}
{(models.registered||[]).filter(m=>m.provider!=="ollama").map(m=><option key={m.name} value={m.name}>{m.name} ({m.provider})</option>)}</select>}
<div style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:"var(--tx3)",fontFamily:"'JetBrains Mono',monospace"}}>
<div style={{width:7,height:7,borderRadius:"50%",background:ok?"var(--gn)":"var(--rd)",animation:"pu 2.5s infinite"}}/>{ok?"Online":"Offline"}</div>
<div style={{padding:"5px 12px",background:"var(--abg)",borderRadius:10,border:"1px solid var(--bd)",fontSize:11,fontWeight:600,color:"var(--ac2)"}}>{user.name||"User"} ({user.role})</div>
<button onClick={onLogout} style={{background:"none",border:"none",color:"var(--tx3)",fontSize:14}} title="Logout">\u{1F6AA}</button>
</div></header>

<div style={{flex:1,display:"flex",overflow:"hidden",position:"relative",zIndex:5}}>

{tab==="chat"&&sb&&<aside style={{width:220,padding:"12px 10px",borderRight:"1.5px solid var(--bd)",display:"flex",flexDirection:"column",gap:6,overflowY:"auto",flexShrink:0,background:"rgba(255,255,255,.5)"}}>
<div style={{fontSize:10,fontWeight:700,color:"var(--tx3)",letterSpacing:".12em",padding:"0 6px 8px",fontFamily:"'JetBrains Mono',monospace"}}>AI AGENTS</div>
{AGENTS.map(a=><button key={a.n} onClick={()=>{sAg(a.n);clr()}} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",borderRadius:12,width:"100%",textAlign:"left",
background:ag===a.n?a.c+"12":"transparent",border:ag===a.n?"1.5px solid "+a.c+"35":"1.5px solid transparent",transition:"all .2s"}}>
<div style={{width:34,height:34,borderRadius:10,background:ag===a.n?a.c+"15":"var(--bg3)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>{a.i}</div>
<div><div style={{fontSize:13,fontWeight:600,color:ag===a.n?a.c:"var(--tx)"}}>{a.l}</div>
<div style={{fontSize:10,color:"var(--tx3)"}}>{a.d}</div></div></button>)}
<div style={{flex:1}}/>
<div style={{padding:"10px 12px",borderRadius:12,background:"var(--bg3)",fontSize:11,color:"var(--tx3)"}}>Model: <b>{mdl}</b></div>
</aside>}

{tab==="chat"&&<main style={{flex:1,display:"flex",flexDirection:"column",minWidth:0}}>
<div className="gl" style={{padding:"10px 18px",borderBottom:"1.5px solid var(--bd)",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
<div style={{display:"flex",alignItems:"center",gap:8}}>
<div style={{width:32,height:32,borderRadius:10,background:aa?.c+"15",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>{aa?.i}</div>
<span style={{fontWeight:700,fontSize:14,color:aa?.c}}>{aa?.l} Agent</span>
<span style={{fontSize:10,color:"var(--tx3)",fontFamily:"'JetBrains Mono',monospace",padding:"3px 8px",background:"var(--bg3)",borderRadius:6}}>{mdl}</span></div>
<div style={{display:"flex",gap:6}}>
{msgs.length>0&&<><Btn small onClick={dl} outline>Save</Btn><Btn small onClick={clr} outline color="var(--rd)">Clear</Btn></>}</div></div>

<div style={{flex:1,overflowY:"auto",padding:"20px 24px"}}>
{msgs.length===0&&<div className="fd" style={{textAlign:"center",paddingTop:50}}>
<div style={{fontSize:48,marginBottom:12,animation:"fl 3s ease infinite"}}>{aa?.i}</div>

function Root(){const[u,sU]=useState(null);const[sc,sSc]=useState("landing");const[ck,sCk]=useState(true);
E(()=>{const t=localStorage.getItem("mt");if(t){fetch(API+"/auth/me",{headers:{Authorization:"Bearer "+t}}).then(r=>r.json()).then(d=>{if(d.user?.role){sU(d.user);sSc("app")}sCk(false)}).catch(()=>sCk(false))}else sCk(false)},[]);
if(ck)return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--bg)"}}><div style={{width:24,height:24,border:"3px solid var(--bg4)",borderTopColor:"var(--ac)",borderRadius:"50%",animation:"sp 1s linear infinite"}}/></div>;
const auth=u2=>{sU(u2);sSc("app")};const lo=()=>{localStorage.removeItem("mt");sU(null);sSc("landing")};
if(sc==="landing"&&!u)return <Landing onStart={m=>{if(m==="guest"){api("/auth/guest",{method:"POST"}).then(d=>{localStorage.setItem("mt",d.token);auth(d.user)}).catch(()=>sSc("login"))}else sSc(m)}}/>;
if((sc==="login"||sc==="register")&&!u)return <Auth mode={sc} onAuth={auth} onBack={()=>sSc("landing")}/>;
if(u)return <App user={u} onLogout={lo}/>;return <Landing onStart={m=>sSc(m)}/>}
ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script></body></html>

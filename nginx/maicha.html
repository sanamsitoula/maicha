<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maicha — AI Automation Platform</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' stop-color='%2338BDF8'/><stop offset='100%25' stop-color='%230EA5E9'/></linearGradient></defs><rect width='64' height='64' rx='16' fill='url(%23g)'/><text x='32' y='44' font-size='32' text-anchor='middle' font-family='serif' font-weight='900' fill='white'>M</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
:root {
  --sky-50: #F0F9FF;
  --sky-100: #E0F2FE;
  --sky-200: #BAE6FD;
  --sky-300: #7DD3FC;
  --sky-400: #38BDF8;
  --sky-500: #0EA5E9;
  --sky-600: #0284C7;
  --sky-700: #0369A1;
  --cream-50: #FDFAF5;
  --cream-100: #FAF5EB;
  --cream-200: #F5EDD6;
  --cream-300: #ECD9B0;
  --text-dark: #0C2340;
  --text-mid: #3D6080;
  --text-soft: #7AA4C0;
  --text-muted: #A8C4D8;
  --border: rgba(14,165,233,0.12);
  --border-strong: rgba(14,165,233,0.22);
  --glass: rgba(255,255,255,0.7);
  --glass-strong: rgba(255,255,255,0.88);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: linear-gradient(135deg, #EBF6FF 0%, #F5F0E8 50%, #E8F4FD 100%);
  font-family: 'Outfit', sans-serif;
  color: var(--text-dark);
  overflow: hidden;
  min-height: 100vh;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse at 10% 15%, rgba(56,189,248,0.18) 0%, transparent 45%),
    radial-gradient(ellipse at 90% 80%, rgba(14,165,233,0.12) 0%, transparent 45%),
    radial-gradient(ellipse at 50% 50%, rgba(250,245,235,0.6) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--sky-200); border-radius: 10px; }
input:focus, textarea:focus, select:focus { outline: none; }

@keyframes fadeSlide { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulse { 0%, 100% { opacity: 0.5; transform: scale(0.95); } 50% { opacity: 1; transform: scale(1.05); } }
@keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-8px); } }
@keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
@keyframes popIn { from { opacity: 0; transform: scale(0.92) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
@keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes dot1 { 0%,80%,100%{transform:scale(0.7);opacity:0.4} 40%{transform:scale(1);opacity:1} }
@keyframes dot2 { 0%,80%,100%{transform:scale(0.7);opacity:0.4} 40%{transform:scale(1);opacity:1} }
@keyframes dot3 { 0%,80%,100%{transform:scale(0.7);opacity:0.4} 40%{transform:scale(1);opacity:1} }
@media (max-width: 768px) {
  header { padding: 10px 14px !important; gap: 8px !important; flex-wrap: wrap !important; }
  header > div:nth-child(2) { order: 3; width: 100%; justify-content: center !important; margin-top: 4px; }
  header > div:nth-child(2) button { padding: 6px 12px !important; font-size: 12px !important; }
  header > div:last-child { gap: 8px !important; }
  header > div:last-child select { padding: 6px 8px !important; font-size: 11px !important; }
  aside { display: none !important; }
  #root > div > div > div:last-child { flex-direction: column !important; }
  main { width: 100% !important; }
  .chat-messages { padding: 14px !important; }
  .chat-input-area { padding: 10px 14px !important; }
}
@media (max-width: 480px) {
  header > div:first-child > div:last-child > div:last-child { display: none !important; }
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const API_BASE = window.location.origin;

const AGENTS = [
  { name: "restaurant", icon: "🍽️", label: "Restaurant", desc: "Orders, menu, reservations", color: "#F97316", bg: "#FFF7ED" },
  { name: "real-estate", icon: "🏠", label: "Real Estate", desc: "Property listings & inquiries", color: "#0EA5E9", bg: "#F0F9FF" },
  { name: "social-media", icon: "📱", label: "Social Media", desc: "Content & hashtags", color: "#EC4899", bg: "#FDF2F8" },
  { name: "marketing", icon: "📣", label: "Marketing", desc: "Ads, emails, campaigns", color: "#8B5CF6", bg: "#F5F3FF" },
  { name: "video", icon: "🎬", label: "Video", desc: "Scripts & media production", color: "#10B981", bg: "#F0FDF4" },
];

const MODELS = [
  { value: "llama3.2:3b", label: "Llama 3.2 (3B)" },
  { value: "phi3:mini", label: "Phi-3 Mini" },
];

const TABS = [
  { id: "chat", label: "Chat", icon: "💬" },
  { id: "explore", label: "Explore", icon: "🔍" },
  { id: "stats", label: "Dashboard", icon: "📊" },
];

async function apiGet(path) {
  const res = await fetch(API_BASE + path);
  if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
  return res.json();
}

async function apiPost(path, body) {
  const res = await fetch(API_BASE + path, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
  return res.json();
}

/* ── Error Popup ── */
function ErrorPopup({ error, onClose }) {
  if (!error) return null;
  return (
    <div style={{
      position: "fixed", inset: 0, zIndex: 1000,
      background: "rgba(12,35,64,0.35)", backdropFilter: "blur(6px)",
      display: "flex", alignItems: "center", justifyContent: "center",
      animation: "fadeSlide 0.2s ease"
    }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{
        background: "white", borderRadius: 20, padding: "32px 36px",
        maxWidth: 420, width: "90%", boxShadow: "0 24px 60px rgba(14,165,233,0.18), 0 4px 16px rgba(0,0,0,0.08)",
        border: "1.5px solid rgba(239,68,68,0.15)", animation: "popIn 0.25s ease"
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 16 }}>
          <div style={{ width: 44, height: 44, borderRadius: 14, background: "#FEF2F2",
            display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22, flexShrink: 0 }}>⚠️</div>
          <div>
            <div style={{ fontWeight: 700, fontSize: 16, color: "#0C2340", fontFamily: "'Outfit', sans-serif" }}>Something went wrong</div>
            <div style={{ fontSize: 12, color: "#EF4444", fontFamily: "'JetBrains Mono', monospace", marginTop: 2 }}>Error</div>
          </div>
        </div>
        <div style={{ background: "#FEF2F2", borderRadius: 12, padding: "14px 18px", marginBottom: 20,
          fontSize: 13, color: "#991B1B", fontFamily: "'JetBrains Mono', monospace", lineHeight: 1.6,
          border: "1px solid #FECACA", wordBreak: "break-word" }}>{error}</div>
        <button onClick={onClose} style={{
          width: "100%", padding: "12px", borderRadius: 12, border: "none",
          background: "linear-gradient(135deg, #0EA5E9, #0284C7)",
          color: "white", fontWeight: 700, fontSize: 14, cursor: "pointer",
          fontFamily: "'Outfit', sans-serif", letterSpacing: "0.02em",
          boxShadow: "0 4px 16px rgba(14,165,233,0.3)"
        }}>Dismiss</button>
      </div>
    </div>
  );
}

/* ── Agent Card ── */
function AgentCard({ agent, selected, onClick }) {
  const isActive = selected === agent.name;
  return (
    <button onClick={() => onClick(agent.name)} style={{
      display: "flex", alignItems: "center", gap: 12, padding: "13px 16px",
      background: isActive ? agent.bg : "rgba(255,255,255,0.55)",
      border: isActive ? `2px solid ${agent.color}40` : "2px solid rgba(14,165,233,0.08)",
      borderRadius: 14, cursor: "pointer", width: "100%", textAlign: "left",
      transition: "all 0.22s ease",
      boxShadow: isActive ? `0 4px 20px ${agent.color}18` : "0 1px 4px rgba(14,165,233,0.06)",
      transform: isActive ? "translateX(3px)" : "translateX(0)",
    }}>
      <div style={{ width: 40, height: 40, borderRadius: 12, background: isActive ? agent.color + "18" : "rgba(14,165,233,0.06)",
        display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20, flexShrink: 0 }}>
        {agent.icon}
      </div>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontWeight: 700, fontSize: 13, color: isActive ? agent.color : "var(--text-dark)", letterSpacing: "0.01em" }}>{agent.label}</div>
        <div style={{ fontSize: 11, color: "var(--text-soft)", marginTop: 2 }}>{agent.desc}</div>
      </div>
      {isActive && <div style={{ width: 7, height: 7, borderRadius: "50%", background: agent.color, flexShrink: 0,
        boxShadow: `0 0 8px ${agent.color}` }} />}
    </button>
  );
}

/* ── Message Bubble ── */
function MessageBubble({ msg, agentColor, agentIcon }) {
  const isUser = msg.role === "user";
  return (
    <div style={{ display: "flex", justifyContent: isUser ? "flex-end" : "flex-start",
      marginBottom: 14, animation: "fadeSlide 0.3s ease", gap: 10, alignItems: "flex-end" }}>
      {!isUser && (
        <div style={{ width: 32, height: 32, borderRadius: 10, background: agentColor + "15",
          display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16, flexShrink: 0 }}>
          {agentIcon}
        </div>
      )}
      <div style={{
        maxWidth: "78%", padding: "13px 17px",
        borderRadius: isUser ? "18px 18px 4px 18px" : "18px 18px 18px 4px",
        background: isUser
          ? "linear-gradient(135deg, var(--sky-500), var(--sky-600))"
          : "rgba(255,255,255,0.85)",
        border: isUser ? "none" : "1.5px solid var(--border)",
        boxShadow: isUser
          ? "0 4px 18px rgba(14,165,233,0.3)"
          : "0 2px 12px rgba(14,165,233,0.06)",
        fontSize: 14, lineHeight: 1.7,
        color: isUser ? "#fff" : "var(--text-dark)",
        whiteSpace: "pre-wrap", wordBreak: "break-word",
        backdropFilter: !isUser ? "blur(12px)" : "none",
      }}>
        {msg.content}
        {msg.elapsed && (
          <div style={{ fontSize: 10, marginTop: 7, opacity: 0.6, textAlign: "right",
            fontFamily: "'JetBrains Mono', monospace" }}>{msg.elapsed}s</div>
        )}
      </div>
    </div>
  );
}

/* ── Stat Card ── */
function StatCard({ label, value, icon, color }) {
  return (
    <div style={{
      background: "rgba(255,255,255,0.75)", border: "1.5px solid var(--border)",
      borderRadius: 18, padding: "22px 24px", flex: "1 1 160px", minWidth: 155,
      backdropFilter: "blur(12px)", boxShadow: "0 2px 16px rgba(14,165,233,0.07)",
      transition: "all 0.2s", animation: "fadeSlide 0.4s ease"
    }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
        <div style={{ width: 38, height: 38, borderRadius: 12, background: color + "15",
          display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18 }}>{icon}</div>
        <span style={{ fontSize: 10, color: color, fontFamily: "'JetBrains Mono', monospace",
          background: color + "12", padding: "3px 9px", borderRadius: 8, fontWeight: 600,
          letterSpacing: "0.05em", textTransform: "uppercase" }}>{label}</span>
      </div>
      <div style={{ fontSize: 34, fontWeight: 800, color: "var(--text-dark)",
        letterSpacing: "-0.03em", fontFamily: "'Instrument Serif', serif" }}>{value ?? "—"}</div>
    </div>
  );
}

/* ── Menu Card ── */
function MenuCard({ item, i }) {
  return (
    <div style={{ background: "rgba(255,255,255,0.82)", border: "1.5px solid var(--border)",
      borderRadius: 18, padding: 22, animation: `fadeSlide 0.3s ease ${i * 0.07}s both`,
      backdropFilter: "blur(10px)", boxShadow: "0 2px 14px rgba(14,165,233,0.06)",
      transition: "transform 0.2s, box-shadow 0.2s" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
        <div style={{ fontWeight: 700, fontSize: 16, color: "var(--text-dark)", lineHeight: 1.3, flex: 1, paddingRight: 12 }}>{item.name}</div>
        <div style={{ fontWeight: 800, fontSize: 20, color: "#F97316",
          fontFamily: "'Instrument Serif', serif", whiteSpace: "nowrap" }}>${item.price}</div>
      </div>
      <div style={{ fontSize: 13, color: "var(--text-mid)", lineHeight: 1.6, marginBottom: 14 }}>{item.description}</div>
      <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
        <span style={{ fontSize: 10, padding: "4px 12px", borderRadius: 20,
          background: "var(--sky-100)", color: "var(--sky-600)", fontWeight: 700,
          letterSpacing: "0.06em", textTransform: "uppercase" }}>{item.category}</span>
        {(item.dietary_tags || []).map((tag, j) => (
          <span key={j} style={{ fontSize: 10, padding: "4px 12px", borderRadius: 20,
            background: "#ECFDF5", color: "#059669", fontWeight: 600 }}>{tag}</span>
        ))}
      </div>
    </div>
  );
}

/* ── Property Card ── */
function PropertyCard({ p, i }) {
  return (
    <div style={{ background: "rgba(255,255,255,0.82)", border: "1.5px solid var(--border)",
      borderRadius: 18, padding: 22, animation: `fadeSlide 0.3s ease ${i * 0.07}s both`,
      backdropFilter: "blur(10px)", boxShadow: "0 2px 14px rgba(14,165,233,0.06)" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
        <span style={{ fontSize: 10, padding: "4px 12px", borderRadius: 20,
          background: p.available ? "#ECFDF5" : "#FEF2F2",
          color: p.available ? "#059669" : "#DC2626", fontWeight: 700 }}>
          {p.available ? "✓ Available" : "Unavailable"}
        </span>
        <span style={{ fontSize: 10, color: "var(--text-muted)", fontFamily: "'JetBrains Mono', monospace" }}>{p.property_type}</span>
      </div>
      <div style={{ fontWeight: 700, fontSize: 16, color: "var(--text-dark)", marginBottom: 6 }}>{p.title}</div>
      <div style={{ fontSize: 22, fontWeight: 800, color: "var(--sky-600)",
        fontFamily: "'Instrument Serif', serif", marginBottom: 8 }}>
        ${Number(p.price).toLocaleString()}<span style={{ fontSize: 13, fontWeight: 500, color: "var(--text-soft)" }}>/mo</span>
      </div>
      <div style={{ fontSize: 13, color: "var(--text-mid)", lineHeight: 1.5, marginBottom: 12 }}>{p.description}</div>
      <div style={{ display: "flex", gap: 16, fontSize: 12, color: "var(--text-soft)" }}>
        <span>🛏 {p.bedrooms} bed</span>
        <span>🚿 {p.bathrooms} bath</span>
        <span>📍 {p.city}, {p.state}</span>
      </div>
    </div>
  );
}

/* ── Loading Dots ── */
function LoadingDots({ color }) {
  return (
    <div style={{ display: "flex", gap: 5, padding: "10px 16px", alignItems: "center" }}>
      {[0,1,2].map(i => (
        <div key={i} style={{ width: 8, height: 8, borderRadius: "50%", background: color,
          animation: `pulse 1.4s ease infinite ${i * 0.16}s` }} />
      ))}
    </div>
  );
}

/* ── Empty State ── */
function EmptyState({ label }) {
  return (
    <div style={{ textAlign: "center", padding: "60px 20px", color: "var(--text-muted)" }}>
      <div style={{ fontSize: 42, marginBottom: 14, opacity: 0.5 }}>📭</div>
      <div style={{ fontSize: 15, fontWeight: 600, color: "var(--text-soft)" }}>No {label} found</div>
      <div style={{ fontSize: 12, marginTop: 4 }}>Data will appear here once available</div>
    </div>
  );
}

/* ── Main App ── */
function App() {
  const [tab, setTab] = useState("chat");
  const [agent, setAgent] = useState("restaurant");
  const [model, setModel] = useState("llama3.2:3b");
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [sessionId, setSessionId] = useState(null);
  const [stats, setStats] = useState(null);
  const [statsLoading, setStatsLoading] = useState(false);
  const [menuData, setMenuData] = useState(null);
  const [propertiesData, setPropertiesData] = useState(null);
  const [ordersData, setOrdersData] = useState(null);
  const [eventsData, setEventsData] = useState(null);
  const [exploreLoading, setExploreLoading] = useState(false);
  const [serverStatus, setServerStatus] = useState(null);
  const [exploreTab, setExploreTab] = useState("menu");
  const [error, setError] = useState(null);
  const chatEndRef = useRef(null);
  const inputRef = useRef(null);
  const activeAgent = AGENTS.find(a => a.name === agent);

  const showError = (msg) => setError(typeof msg === "string" ? msg : (msg?.message || "Unknown error"));

  useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages, loading]);
  useEffect(() => {
    apiGet("/health").then(setServerStatus).catch(() => setServerStatus({ status: "offline" }));
  }, []);

  const sendMessage = useCallback(async () => {
    if (!input.trim() || loading) return;
    const userMsg = input.trim();
    setInput("");
    setMessages(prev => [...prev, { role: "user", content: userMsg }]);
    setLoading(true);
    try {
      const res = await apiPost("/chat", { message: userMsg, agent_type: agent, session_id: sessionId || "new" });
      setSessionId(res.session_id);
      setMessages(prev => [...prev, { role: "assistant", content: res.response, elapsed: res.elapsed_seconds }]);
    } catch (err) {
      showError(err.message);
      setMessages(prev => prev.slice(0, -1)); // remove user msg on error
    }
    setLoading(false);
  }, [input, loading, agent, sessionId]);

  const clearChat = () => { setMessages([]); setSessionId(null); };

  const downloadResults = () => {
    const text = messages.map(m => (m.role === "user" ? "You" : activeAgent.label) + ": " + m.content).join("\n\n---\n\n");
    const blob = new Blob([text], { type: "text/plain" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "maicha-" + agent + "-" + new Date().toISOString().slice(0, 10) + ".txt";
    a.click(); URL.revokeObjectURL(url);
  };

  const loadExploreData = useCallback(async (section) => {
    setExploreTab(section);
    setExploreLoading(true);
    try {
      if (section === "menu" && !menuData) setMenuData(await apiGet("/menu"));
      else if (section === "properties" && !propertiesData) setPropertiesData(await apiGet("/properties"));
      else if (section === "orders" && !ordersData) setOrdersData(await apiGet("/orders"));
      else if (section === "events" && !eventsData) setEventsData(await apiGet("/events"));
    } catch (e) { showError(e.message); }
    setExploreLoading(false);
  }, [menuData, propertiesData, ordersData, eventsData]);

  const loadStats = useCallback(async () => {
    setStatsLoading(true);
    try { setStats(await apiGet("/stats")); }
    catch (e) { showError(e.message); }
    setStatsLoading(false);
  }, []);

  useEffect(() => { if (tab === "stats") loadStats(); }, [tab]);
  useEffect(() => { if (tab === "explore") loadExploreData("menu"); }, [tab]);

  const quickPrompts = {
    "restaurant": ["What's on the menu?", "Order a Neural Burger", "Reserve table for 4"],
    "real-estate": ["Show available properties", "Properties under $3000", "Schedule a viewing"],
    "social-media": ["Instagram post about food", "TikTok caption ideas", "Hashtags for travel"],
    "marketing": ["Email subject for summer sale", "Ad copy for new product", "Blog post about AI"],
    "video": ["30s TikTok cooking script", "YouTube intro script", "Create a voiceover job"],
  };

  const exploreTabs = [
    { id: "menu", label: "🍽️ Menu", color: "#F97316" },
    { id: "properties", label: "🏠 Properties", color: "#0EA5E9" },
    { id: "orders", label: "📋 Orders", color: "#10B981" },
    { id: "events", label: "⚡ Events", color: "#8B5CF6" },
  ];

  return (
    <div style={{ minHeight: "100vh", fontFamily: "'Outfit', sans-serif", position: "relative", overflow: "hidden" }}>
      <ErrorPopup error={error} onClose={() => setError(null)} />

      {/* Header */}
      <header style={{
        position: "relative", zIndex: 10, padding: "14px 24px",
        display: "flex", alignItems: "center", justifyContent: "space-between",
        borderBottom: "1.5px solid var(--border)",
        backdropFilter: "blur(20px)",
        background: "rgba(255,255,255,0.72)",
        boxShadow: "0 1px 0 rgba(14,165,233,0.08)"
      }}>
        {/* Logo */}
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <div style={{
            width: 40, height: 40, borderRadius: 13, display: "flex", alignItems: "center", justifyContent: "center",
            background: "linear-gradient(135deg, var(--sky-400), var(--sky-600))",
            fontSize: 20, fontWeight: 900, color: "#fff",
            fontFamily: "'Instrument Serif', serif",
            boxShadow: "0 4px 16px rgba(14,165,233,0.35)"
          }}>M</div>
          <div>
            <div style={{ fontSize: 20, fontWeight: 700, fontFamily: "'Instrument Serif', serif",
              color: "var(--text-dark)", letterSpacing: "-0.01em" }}>Maicha</div>
            <div style={{ fontSize: 9, color: "var(--text-muted)", fontFamily: "'JetBrains Mono', monospace",
              letterSpacing: "0.12em", textTransform: "uppercase" }}>AI Automation Platform</div>
          </div>
        </div>

        {/* Tabs */}
        <div style={{ display: "flex", gap: 3, background: "rgba(14,165,233,0.06)",
          borderRadius: 14, padding: "4px", border: "1.5px solid var(--border)" }}>
          {TABS.map(t => (
            <button key={t.id} onClick={() => setTab(t.id)} style={{
              padding: "8px 18px", borderRadius: 11, border: "none", cursor: "pointer",
              background: tab === t.id ? "white" : "transparent",
              color: tab === t.id ? "var(--sky-600)" : "var(--text-soft)",
              fontFamily: "'Outfit', sans-serif", fontSize: 13, fontWeight: 600,
              transition: "all 0.2s ease",
              boxShadow: tab === t.id ? "0 2px 10px rgba(14,165,233,0.14)" : "none",
              display: "flex", alignItems: "center", gap: 6
            }}>
              <span style={{ fontSize: 14 }}>{t.icon}</span> {t.label}
            </button>
          ))}
        </div>

        {/* Right: model + status */}
        <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
          <select value={model} onChange={e => setModel(e.target.value)} style={{
            background: "rgba(255,255,255,0.8)", border: "1.5px solid var(--border)",
            borderRadius: 10, padding: "8px 12px", color: "var(--text-mid)", fontSize: 12,
            fontFamily: "'JetBrains Mono', monospace", cursor: "pointer"
          }}>
            {MODELS.map(m => <option key={m.value} value={m.value}>{m.label}</option>)}
          </select>
          <div style={{ display: "flex", alignItems: "center", gap: 7, fontSize: 12,
            color: "var(--text-mid)", fontFamily: "'JetBrains Mono', monospace",
            background: "rgba(255,255,255,0.7)", border: "1.5px solid var(--border)",
            borderRadius: 10, padding: "6px 12px" }}>
            <div style={{ width: 7, height: 7, borderRadius: "50%",
              background: serverStatus?.status === "healthy" ? "#10B981" : "#EF4444",
              boxShadow: serverStatus?.status === "healthy" ? "0 0 7px #10B98170" : "0 0 7px #EF444470",
              animation: "pulse 2.5s ease infinite" }} />
            {serverStatus?.status === "healthy" ? "Online" : "Offline"}
          </div>
        </div>
      </header>

      {/* Main Content */}
      <div style={{ position: "relative", zIndex: 5, display: "flex", height: "calc(100vh - 69px)" }}>

        {/* ─── CHAT TAB ─── */}
        {tab === "chat" && (<>
          <aside style={{
            width: 265, padding: "18px 14px",
            borderRight: "1.5px solid var(--border)",
            display: "flex", flexDirection: "column", gap: 7,
            overflowY: "auto", flexShrink: 0,
            background: "rgba(255,255,255,0.4)", backdropFilter: "blur(10px)"
          }}>
            <div style={{ fontSize: 10, fontWeight: 700, color: "var(--text-muted)",
              letterSpacing: "0.14em", fontFamily: "'JetBrains Mono', monospace",
              padding: "0 4px 10px", textTransform: "uppercase" }}>AI Agents</div>
            {AGENTS.map(a => <AgentCard key={a.name} agent={a} selected={agent}
              onClick={(n) => { setAgent(n); clearChat(); }} />)}
            <div style={{ flex: 1 }} />
            <div style={{ padding: "14px 16px", borderRadius: 14,
              background: "rgba(255,255,255,0.6)", border: "1.5px solid var(--border)", marginTop: 6 }}>
              <div style={{ fontSize: 10, color: "var(--text-muted)", fontFamily: "'JetBrains Mono', monospace",
                letterSpacing: "0.08em", marginBottom: 5, textTransform: "uppercase" }}>Guest Session</div>
              <div style={{ fontSize: 12, color: "var(--text-soft)" }}>No sign-in required.</div>
            </div>
          </aside>

          <main style={{ flex: 1, display: "flex", flexDirection: "column", minWidth: 0 }}>
            {/* Chat toolbar */}
            <div style={{ padding: "12px 24px", borderBottom: "1.5px solid var(--border)",
              display: "flex", alignItems: "center", justifyContent: "space-between",
              background: "rgba(255,255,255,0.5)", backdropFilter: "blur(10px)" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <div style={{ width: 34, height: 34, borderRadius: 11, background: activeAgent?.color + "15",
                  display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18 }}>
                  {activeAgent?.icon}
                </div>
                <div>
                  <span style={{ fontWeight: 700, fontSize: 14, color: activeAgent?.color }}>{activeAgent?.label} Agent</span>
                  <span style={{ fontSize: 11, color: "var(--text-muted)", marginLeft: 8,
                    fontFamily: "'JetBrains Mono', monospace" }}>{model}</span>
                </div>
              </div>
              <div style={{ display: "flex", gap: 8 }}>
                {messages.length > 0 && (<>
                  <button onClick={downloadResults} style={{
                    padding: "7px 15px", borderRadius: 9,
                    border: "1.5px solid var(--border)",
                    background: "rgba(255,255,255,0.7)", color: "var(--text-mid)",
                    fontSize: 12, cursor: "pointer", fontWeight: 600
                  }}>⬇ Download</button>
                  <button onClick={clearChat} style={{
                    padding: "7px 15px", borderRadius: 9,
                    border: "1.5px solid rgba(239,68,68,0.2)",
                    background: "#FEF2F2", color: "#EF4444",
                    fontSize: 12, cursor: "pointer", fontWeight: 600
                  }}>✕ Clear</button>
                </>)}
              </div>
            </div>

            {/* Messages */}
            <div style={{ flex: 1, overflowY: "auto", padding: "24px 28px" }}>
              {messages.length === 0 && (
                <div style={{ textAlign: "center", paddingTop: 70, animation: "fadeSlide 0.5s ease" }}>
                  <div style={{ fontSize: 56, marginBottom: 18, animation: "float 3s ease infinite" }}>{activeAgent?.icon}</div>
                  <div style={{ fontSize: 26, fontWeight: 700, fontFamily: "'Instrument Serif', serif",
                    color: "var(--text-dark)", marginBottom: 8 }}>Chat with {activeAgent?.label} Agent</div>
                  <div style={{ fontSize: 14, color: "var(--text-soft)", maxWidth: 380, margin: "0 auto", lineHeight: 1.7 }}>
                    {activeAgent?.desc}. Ask anything.</div>
                  <div style={{ display: "flex", gap: 8, justifyContent: "center", marginTop: 28, flexWrap: "wrap" }}>
                    {(quickPrompts[agent] || []).map(q => (
                      <button key={q} onClick={() => { setInput(q); setTimeout(() => inputRef.current?.focus(), 50); }} style={{
                        padding: "9px 18px", borderRadius: 22,
                        border: `1.5px solid ${activeAgent.color}30`,
                        background: activeAgent.color + "08",
                        color: activeAgent.color, fontSize: 13, cursor: "pointer", fontWeight: 600,
                        transition: "all 0.2s", backdropFilter: "blur(6px)"
                      }}>{q}</button>
                    ))}
                  </div>
                </div>
              )}
              {messages.map((msg, i) => (
                <MessageBubble key={i} msg={msg} agentColor={activeAgent?.color || "#0EA5E9"} agentIcon={activeAgent?.icon} />
              ))}
              {loading && (
                <div style={{ display: "flex", alignItems: "flex-end", gap: 10, animation: "fadeSlide 0.3s ease" }}>
                  <div style={{ width: 32, height: 32, borderRadius: 10, background: activeAgent?.color + "15",
                    display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16 }}>
                    {activeAgent?.icon}
                  </div>
                  <div style={{ background: "rgba(255,255,255,0.85)", border: "1.5px solid var(--border)",
                    borderRadius: "18px 18px 18px 4px", backdropFilter: "blur(10px)" }}>
                    <LoadingDots color={activeAgent?.color || "#0EA5E9"} />
                  </div>
                </div>
              )}
              <div ref={chatEndRef} />
            </div>

            {/* Input */}
            <div style={{ padding: "14px 22px", borderTop: "1.5px solid var(--border)",
              background: "rgba(255,255,255,0.6)", backdropFilter: "blur(16px)" }}>
              <div style={{ display: "flex", gap: 10, alignItems: "flex-end",
                background: "rgba(255,255,255,0.85)", border: `1.5px solid ${input.trim() ? activeAgent?.color + "40" : "var(--border)"}`,
                borderRadius: 18, padding: "4px 4px 4px 18px",
                boxShadow: input.trim() ? `0 0 0 3px ${activeAgent?.color}12` : "0 2px 8px rgba(14,165,233,0.06)",
                transition: "all 0.2s" }}>
                <input ref={inputRef} value={input}
                  onChange={e => setInput(e.target.value)}
                  onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) sendMessage(); }}
                  placeholder={`Message ${activeAgent?.label} Agent...`}
                  disabled={loading}
                  style={{ flex: 1, background: "transparent", border: "none",
                    color: "var(--text-dark)", fontSize: 14, fontFamily: "'Outfit', sans-serif",
                    padding: "12px 0", opacity: loading ? 0.5 : 1 }} />
                <button onClick={sendMessage} disabled={loading || !input.trim()} style={{
                  padding: "10px 22px", borderRadius: 14, border: "none",
                  cursor: loading ? "wait" : "pointer",
                  background: input.trim()
                    ? `linear-gradient(135deg, ${activeAgent?.color}, ${activeAgent?.color}CC)`
                    : "rgba(14,165,233,0.08)",
                  color: input.trim() ? "#fff" : "var(--text-muted)",
                  fontSize: 14, fontWeight: 700,
                  transition: "all 0.2s",
                  boxShadow: input.trim() ? `0 4px 16px ${activeAgent?.color}40` : "none"
                }}>{loading ? "···" : "Send"}</button>
              </div>
            </div>
          </main>
        </>)}

        {/* ─── EXPLORE TAB ─── */}
        {tab === "explore" && (
          <div style={{ flex: 1, overflowY: "auto", padding: 28 }}>
            <div style={{ marginBottom: 24 }}>
              <div style={{ fontSize: 28, fontWeight: 700, fontFamily: "'Instrument Serif', serif",
                color: "var(--text-dark)", marginBottom: 4 }}>Explore Data</div>
              <div style={{ fontSize: 13, color: "var(--text-soft)" }}>Browse live data from your AI platform</div>
            </div>

            {/* Sub-tabs */}
            <div style={{ display: "flex", gap: 8, marginBottom: 26, flexWrap: "wrap" }}>
              {exploreTabs.map(t => (
                <button key={t.id} onClick={() => loadExploreData(t.id)} style={{
                  padding: "10px 22px", borderRadius: 14,
                  border: exploreTab === t.id ? `2px solid ${t.color}50` : "2px solid var(--border)",
                  background: exploreTab === t.id ? t.color + "10" : "rgba(255,255,255,0.65)",
                  color: exploreTab === t.id ? t.color : "var(--text-mid)",
                  fontSize: 13, cursor: "pointer", fontWeight: 700,
                  transition: "all 0.2s", backdropFilter: "blur(8px)",
                  boxShadow: exploreTab === t.id ? `0 4px 16px ${t.color}18` : "none"
                }}>{t.label}</button>
              ))}
            </div>

            {/* Loading */}
            {exploreLoading && (
              <div style={{ display: "flex", justifyContent: "center", padding: "60px 0" }}>
                <div style={{ display: "flex", gap: 8 }}>
                  {[0,1,2].map(i => (
                    <div key={i} style={{ width: 10, height: 10, borderRadius: "50%",
                      background: "var(--sky-400)", animation: `pulse 1.4s ease infinite ${i * 0.16}s` }} />
                  ))}
                </div>
              </div>
            )}

            {!exploreLoading && exploreTab === "menu" && menuData && (
              menuData.menu_items?.length === 0 ? <EmptyState label="menu items" /> :
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: 16 }}>
                {menuData.menu_items?.map((item, i) => <MenuCard key={i} item={item} i={i} />)}
              </div>
            )}

            {!exploreLoading && exploreTab === "properties" && propertiesData && (
              propertiesData.properties?.length === 0 ? <EmptyState label="properties" /> :
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(320px, 1fr))", gap: 16 }}>
                {propertiesData.properties?.map((p, i) => <PropertyCard key={i} p={p} i={i} />)}
              </div>
            )}

            {!exploreLoading && exploreTab === "orders" && ordersData && (
              ordersData.orders?.length === 0 ? <EmptyState label="orders" /> :
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                {ordersData.orders?.map((o, i) => (
                  <div key={i} style={{ background: "rgba(255,255,255,0.82)", border: "1.5px solid var(--border)",
                    borderRadius: 14, padding: "16px 22px",
                    display: "flex", justifyContent: "space-between", alignItems: "center",
                    animation: `fadeSlide 0.3s ease ${i * 0.04}s both`,
                    backdropFilter: "blur(10px)", boxShadow: "0 2px 10px rgba(14,165,233,0.05)" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
                      <div style={{ width: 40, height: 40, borderRadius: 12, background: "var(--sky-100)",
                        display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18 }}>🧾</div>
                      <div>
                        <div style={{ fontWeight: 700, fontSize: 14, color: "var(--text-dark)" }}>{o.customer_name || "Guest"}</div>
                        <div style={{ fontSize: 11, color: "var(--text-muted)", fontFamily: "'JetBrains Mono', monospace", marginTop: 2 }}>
                          #{String(o.id).slice(0, 8)}...
                        </div>
                      </div>
                    </div>
                    <div style={{ textAlign: "right" }}>
                      <div style={{ fontWeight: 800, fontSize: 18, color: "#10B981",
                        fontFamily: "'Instrument Serif', serif" }}>${Number(o.total).toFixed(2)}</div>
                      <div style={{ fontSize: 11, padding: "3px 10px", borderRadius: 8, marginTop: 4, display: "inline-block",
                        background: o.status === "confirmed" ? "#ECFDF5" : "#FEF2F2",
                        color: o.status === "confirmed" ? "#059669" : "#DC2626", fontWeight: 700 }}>
                        {o.status}
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {!exploreLoading && exploreTab === "events" && eventsData && (
              eventsData.events?.length === 0 ? <EmptyState label="events" /> :
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {eventsData.events?.map((e, i) => (
                  <div key={i} style={{ background: "rgba(255,255,255,0.82)", border: "1.5px solid var(--border)",
                    borderRadius: 12, padding: "13px 18px",
                    display: "flex", gap: 14, alignItems: "center",
                    animation: `fadeSlide 0.25s ease ${i * 0.03}s both`,
                    backdropFilter: "blur(10px)" }}>
                    <span style={{ fontSize: 10, padding: "4px 12px", borderRadius: 8,
                      background: "#F5F3FF", color: "#7C3AED", fontWeight: 700,
                      fontFamily: "'JetBrains Mono', monospace", whiteSpace: "nowrap" }}>{e.event_type}</span>
                    <span style={{ fontSize: 12, color: "var(--text-soft)", fontFamily: "'JetBrains Mono', monospace" }}>{e.source}</span>
                    <span style={{ fontSize: 12, color: "var(--text-muted)", flex: 1, overflow: "hidden",
                      textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{JSON.stringify(e.data)}</span>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {/* ─── DASHBOARD TAB ─── */}
        {tab === "stats" && (
          <div style={{ flex: 1, overflowY: "auto", padding: 28 }}>
            <div style={{ marginBottom: 28, display: "flex", justifyContent: "space-between", alignItems: "flex-end" }}>
              <div>
                <div style={{ fontSize: 28, fontWeight: 700, fontFamily: "'Instrument Serif', serif",
                  color: "var(--text-dark)", marginBottom: 4 }}>Dashboard</div>
                <div style={{ fontSize: 13, color: "var(--text-soft)" }}>Real-time system statistics</div>
              </div>
              <button onClick={loadStats} disabled={statsLoading} style={{
                padding: "10px 22px", borderRadius: 12,
                border: "1.5px solid var(--border)",
                background: "rgba(255,255,255,0.75)", color: "var(--sky-600)",
                fontSize: 13, cursor: statsLoading ? "wait" : "pointer", fontWeight: 700,
                backdropFilter: "blur(8px)", display: "flex", alignItems: "center", gap: 6
              }}>
                {statsLoading ? "Loading..." : "↻ Refresh"}
              </button>
            </div>

            {statsLoading && (
              <div style={{ display: "flex", justifyContent: "center", paddingTop: 80 }}>
                <div style={{ display: "flex", gap: 8 }}>
                  {[0,1,2].map(i => (
                    <div key={i} style={{ width: 12, height: 12, borderRadius: "50%",
                      background: "var(--sky-400)", animation: `pulse 1.4s ease infinite ${i * 0.16}s` }} />
                  ))}
                </div>
              </div>
            )}

            {!statsLoading && stats && (
              <div style={{ display: "flex", flexWrap: "wrap", gap: 14 }}>
                <StatCard label="Conversations" value={stats.stats?.conversations} icon="💬" color="#0EA5E9" />
                <StatCard label="Messages" value={stats.stats?.messages} icon="✉️" color="#8B5CF6" />
                <StatCard label="Orders" value={stats.stats?.orders} icon="🍽️" color="#F97316" />
                <StatCard label="Reservations" value={stats.stats?.reservations} icon="📅" color="#EC4899" />
                <StatCard label="Properties" value={stats.stats?.property_listings} icon="🏠" color="#0EA5E9" />
                <StatCard label="Inquiries" value={stats.stats?.property_inquiries} icon="📩" color="#10B981" />
                <StatCard label="Content Queue" value={stats.stats?.content_queue} icon="📱" color="#F59E0B" />
                <StatCard label="Scripts" value={stats.stats?.generated_scripts} icon="🎬" color="#8B5CF6" />
                <StatCard label="Media Jobs" value={stats.stats?.media_jobs} icon="🎥" color="#F97316" />
                <StatCard label="Events" value={stats.stats?.events} icon="⚡" color="#F59E0B" />
              </div>
            )}

            {!statsLoading && !stats && (
              <div style={{ textAlign: "center", paddingTop: 80, color: "var(--text-muted)" }}>
                <div style={{ fontSize: 48, marginBottom: 16 }}>📊</div>
                <div style={{ fontSize: 16, fontWeight: 600, color: "var(--text-soft)" }}>No stats loaded yet</div>
                <div style={{ fontSize: 13, marginTop: 4 }}>Click Refresh to load dashboard data</div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>

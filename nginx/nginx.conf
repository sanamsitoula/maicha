events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;

    server {
        listen 80;
        server_name _;

        root /etc/nginx;

        location = / {
            try_files /maicha.html =404;
        }

        location /health { proxy_pass http://fastapi:8000; proxy_set_header Host $host; }
        location /agents { proxy_pass http://fastapi:8000; proxy_set_header Host $host; }
        location /chat { proxy_pass http://fastapi:8000; proxy_set_header Host $host; proxy_set_header Content-Type $http_content_type; proxy_read_timeout 300s; }
        location /menu { proxy_pass http://fastapi:8000; proxy_set_header Host $host; }
        location /properties { proxy_pass http://fastapi:8000; proxy_set_header Host $host; }
        location /orders { proxy_pass http://fastapi:8000; proxy_set_header Host $host; }
        location /conversations { proxy_pass http://fastapi:8000; proxy_set_header Host $host; }
        location /events { proxy_pass http://fastapi:8000; proxy_set_header Host $host; }
        location /stats { proxy_pass http://fastapi:8000; proxy_set_header Host $host; }
        location /docs { proxy_pass http://fastapi:8000; proxy_set_header Host $host; }
        location /openapi.json { proxy_pass http://fastapi:8000; proxy_set_header Host $host; }
        location /settings { proxy_pass http://fastapi:8000; proxy_set_header Host $host; proxy_set_header Content-Type $http_content_type; }
        location /notify { proxy_pass http://fastapi:8000; proxy_set_header Host $host; proxy_set_header Content-Type $http_content_type; }
        location /translate { proxy_pass http://fastapi:8000; proxy_set_header Host $host; proxy_set_header Content-Type $http_content_type; proxy_read_timeout 300s; }
        location /content { proxy_pass http://fastapi:8000; proxy_set_header Host $host; proxy_set_header Content-Type $http_content_type; proxy_read_timeout 300s; }
        location /hermes { proxy_pass http://fastapi:8000; proxy_set_header Host $host; proxy_set_header Content-Type $http_content_type; proxy_read_timeout 300s; }

        location /n8n/ {
            proxy_pass http://n8n:5678/;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 300s;
        }
    }
}
